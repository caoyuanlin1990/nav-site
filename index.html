<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航系统 KV版</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;cursor:pointer}
.btn{padding:10px;border:none;border-radius:8px;background:#165DFF;color:#fff;margin:5px 0;width:100%}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc}
</style>
</head>

<body>

<h2>🧭 导航系统（KV版）</h2>

<div id="login">
  <input id="pwd" placeholder="输入管理密码">
  <button class="btn" onclick="login()">登录</button>
</div>

<div id="admin" style="display:none;">
  <h3>⚙️ 管理后台</h3>

  <input id="name" placeholder="名称">
  <input id="url" placeholder="链接">
  <button class="btn" onclick="add()">➕ 添加</button>

  <button class="btn" onclick="saveToKV()">☁️ 同步到云端</button>

  <div id="list"></div>
</div>

<script>
// ====== 改这里 ======
const KV_API = "https://你的worker地址.workers.dev";

// ====== 数据 ======
let data = {
  lines: []
};

// ====== 登录 ======
function login(){
  const pwd = document.getElementById("pwd").value;
  if(pwd==="668899"){
    document.getElementById("login").style.display="none";
    document.getElementById("admin").style.display="block";
    loadFromKV();
  }else{
    alert("密码错误");
  }
}

// ====== 渲染 ======
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.lines.forEach((item,i)=>{
    list.innerHTML += `
      <div class="card" onclick="window.open('${item.url}')">
        ${item.name}
        <br>
        <button onclick="del(${i});event.stopPropagation()">删除</button>
      </div>
    `;
  });
}

// ====== 添加 ======
function add(){
  const name = document.getElementById("name").value;
  const url = document.getElementById("url").value;

  if(!name || !url){
    alert("不能为空");
    return;
  }

  data.lines.push({name,url});
  render();
}

// ====== 删除 ======
function del(i){
  data.lines.splice(i,1);
  render();
}

// ====== 从KV读取 ======
async function loadFromKV(){
  try{
    const res = await fetch(`${KV_API}/get?t=${Date.now()}`);
    const d = await res.json();

    if(d.lines){
      data = d;
    }

    render();

  }catch(e){
    alert("加载失败");
  }
}

// ====== 保存到KV ======
async function saveToKV(){
  try{
    await fetch(`${KV_API}/set`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        password:"668899",
        data
      })
    });

    alert("☁️ 已同步");

  }catch(e){
    alert("❌ 失败");
  }
}
</script>

</body>
</html>
